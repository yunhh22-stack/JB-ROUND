<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JB ROUND DISPLAY</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#020617,#020617 40%,#020617);
  color:#fff;
}

.wrap{padding:20px}

.title{
  text-align:center;
  font-size:34px;
  margin-bottom:20px;
  color:#e2e8f0;
}

/* 팀 카드 */
.team-wrap{
  display:flex;
  gap:12px;
  margin-bottom:20px;
}

.team-card{
  flex:1;
  padding:16px;
  border-radius:16px;
  background:#1e293b;
  text-align:center;
  font-size:22px;
  font-weight:700;
}

.team-card.win{
  background:#4ade80;
  color:#000;
  box-shadow:0 0 25px rgba(74,222,128,0.8);
  animation:pulse 0.6s ease;
}

.team-score{
  font-size:36px;
  margin-top:8px;
}

/* 랭킹 */
.rank{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  margin-bottom:10px;
  border-radius:16px;
  background:#1e293b;
  font-size:24px;
}

.rank.first{
  background:#166534;
  color:#86efac;
  font-weight:900;
}

.rank-score{
  font-size:28px;
  color:#4ade80;
}

/* 현재 선수 */
.current{
  margin-top:40px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}

.name{
  font-size:36px;
}

.score{
  font-size:140px;
  font-weight:900;
  color:#4ade80;
  text-shadow:0 0 30px rgba(74,222,128,0.9);
}

.sub{
  color:#64748b;
  font-size:14px;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">2026 1st JB ROUND</div>

<div class="team-wrap" id="team"></div>

<div id="ranking"></div>

<div class="current">
  <div>
    <div class="name" id="name"></div>
    <div class="sub">TOTAL SCORE</div>
  </div>
  <div class="score" id="score">0</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAI0fh14tmNc0y9HcAkQ34l0Z_1BFbpiOw",
  authDomain: "jb-roun.firebaseapp.com",
  projectId: "jb-roun"
});

const db = getFirestore(app);
const ref = doc(db, "game", "live");

const players = ["윤상연","박상현","이선영","원미진"];

function calc(d){
  return d.att.reduce((a,b)=>a+b,0)+d.extra+d.eagle+d.birdie;
}

onSnapshot(ref,(snap)=>{
  if(!snap.exists()) return;
  const s = snap.data();

  const scores = players.map((p,i)=>({
    name:p,
    score:calc(s.scores[i])
  })).sort((a,b)=>b.score-a.score);

  const r=document.getElementById("ranking");
  r.innerHTML="";

  scores.forEach((v,i)=>{
    const div=document.createElement("div");
    div.className="rank"+(i===0?" first":"");
    div.innerHTML=`
      <div>${i+1}위 ${v.name}</div>
      <div class="rank-score">${v.score}</div>
    `;
    r.appendChild(div);
  });

  const team1 = calc(s.scores[0]) + calc(s.scores[1]);
  const team2 = calc(s.scores[2]) + calc(s.scores[3]);

  const teamEl=document.getElementById("team");

  if(team1 > team2){
    teamEl.innerHTML=`
      <div class="team-card win">윤상연+박상현<div class="team-score">${team1}</div></div>
      <div class="team-card">이선영+원미진<div class="team-score">${team2}</div></div>
    `;
  }else if(team2 > team1){
    teamEl.innerHTML=`
      <div class="team-card">윤상연+박상현<div class="team-score">${team1}</div></div>
      <div class="team-card win">이선영+원미진<div class="team-score">${team2}</div></div>
    `;
  }else{
    teamEl.innerHTML=`
      <div class="team-card">윤상연+박상현<div class="team-score">${team1}</div></div>
      <div class="team-card">이선영+원미진<div class="team-score">${team2}</div></div>
    `;
  }

  document.getElementById("name").innerText = players[s.current];
  document.getElementById("score").innerText = calc(s.scores[s.current]);
});
</script>

</body>
</html>
