<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JB ROUND LIVE</title>

<style>
body {margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0b1220;color:#fff}

.header {
  position:sticky;
  top:0;
  background:linear-gradient(90deg,#020617,#0f172a);
  padding:12px;
  text-align:center;
}

.players {display:flex;gap:8px;margin-top:10px}
.player {
  flex:1;
  padding:10px;
  border-radius:12px;
  background:#1e293b;
}
.player.active {
  background:#22c55e;
  color:#000;
  font-weight:bold;
}

/* 🔥 합산 점수 강조 */
.total {
  font-size:70px;
  margin-top:10px;
  font-weight:900;
  color:#22c55e;
  text-shadow:0 0 15px rgba(34,197,94,0.6);
}

.container {padding:12px}

.card {
  background:#111827;
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #1e293b;
}

.label {
  margin:8px 0;
  color:#cbd5f5;
  font-size:14px;
  font-weight:600;
}

.btn-group {display:flex;flex-wrap:wrap;gap:6px}

.btn {
  flex:1;
  min-width:36px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:#fff;
}

.btn.active {
  background:#22c55e;
  color:#000;
  font-weight:bold;
}

/* 순위 */
.ranking {
  background:#020617;
  padding:10px;
  border-bottom:1px solid #1e293b;
}

.rank-item {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
}

.rank-item.first {
  color:#22c55e;
  font-weight:bold;
}

/* 팀 점수 */
.team {
  background:#164e63;
  padding:10px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  color:#67e8f9;
}

.footer {
  font-size:12px;
  color:#94a3b8;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="ranking" id="ranking"></div>
<div class="team" id="team"></div>

<div class="header">
  <div class="players" id="players"></div>
  <div class="total" id="total">0</div>
</div>

<div class="container" id="controls"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAI0fh14tmNc0y9HcAkQ34l0Z_1BFbpiOw",
  authDomain: "jb-roun.firebaseapp.com",
  projectId: "jb-roun",
  storageBucket: "jb-roun.appspot.com",
  messagingSenderId: "342362716882",
  appId: "1:342362716882:web:5f2ae86fa23b4eef3f4b0b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "game", "live");

const players = ["윤상연","박상현","이선영","원미진"];

let state = {
  current:0,
  scores: players.map(()=>({att:[0,0,0,0,0],extra:30,eagle:0,birdie:0}))
};

function save(){ setDoc(ref,state); }

onSnapshot(ref,(snap)=>{
  if(snap.exists()){ state = snap.data(); render(); }
});

function calcTotal(d){
  return d.att.reduce((a,b)=>a+b,0)+d.extra+d.eagle+d.birdie;
}

function render(){

  // 🔥 순위
  const rankingEl=document.getElementById("ranking");
  const ranked = players.map((p,i)=>({name:p,score:calcTotal(state.scores[i])}))
    .sort((a,b)=>b.score-a.score);

  rankingEl.innerHTML="";
  ranked.forEach((r,i)=>{
    const div=document.createElement("div");
    div.className="rank-item"+(i===0?" first":"");
    div.innerHTML=`${i+1}위 ${r.name} <span>${r.score}</span>`;
    rankingEl.appendChild(div);
  });

  // 🔥 팀 점수
  const team1 = calcTotal(state.scores[0]) + calcTotal(state.scores[1]);
  const team2 = calcTotal(state.scores[2]) + calcTotal(state.scores[3]);
  document.getElementById("team").innerText =
    `윤상연+박상현 ${team1}  |  이선영+원미진 ${team2}`;

  // 플레이어 선택
  const pEl=document.getElementById("players");
  pEl.innerHTML="";
  players.forEach((p,i)=>{
    const el=document.createElement("div");
    el.className="player"+(i===state.current?" active":"");
    el.innerText=p;
    el.onclick=()=>{ state.current=i; save(); };
    pEl.appendChild(el);
  });

  const d = state.scores[state.current];

  // 🔥 합산 점수 표시 업그레이드
  document.getElementById("total").innerHTML = `
    ${calcTotal(d)}
    <div style="font-size:12px;color:#94a3b8;">TOTAL</div>
  `;

  const c=document.getElementById("controls");
  c.innerHTML="";

  function section(title){
    const div=document.createElement("div");
    div.className="card";
    const t=document.createElement("div");
    t.className="label";
    t.innerText=title;
    div.appendChild(t);
    c.appendChild(div);
    return div;
  }

  function buttons(parent,value,setter,min,max,step){
    const wrap=document.createElement("div");
    wrap.className="btn-group";
    for(let i=min;i<=max;i+=step){
      const b=document.createElement("button");
      b.className="btn"+(value===i?" active":"");
      b.innerText=i;
      b.onclick=()=>setter(i);
      wrap.appendChild(b);
    }
    parent.appendChild(wrap);
  }

  // 🔥 한줄 구조 (오류 제거 완료)
  const attSection = section("정성 평가 (0~10)");

  [
    "매너 (필드 플레이 중 매너)",
    "인성 (동반자&캐디를 대하는 태도)",
    "패션 (착장의 기발함)",
    "인상 (웃는 표정)",
    "말투 (욕설 여부 등)"
  ].forEach((item,i)=>{
    const row=document.createElement("div");
    row.className="label";
    row.innerText=item;
    attSection.appendChild(row);

    buttons(attSection,d.att[i],(v)=>{d.att[i]=v;save()},0,10,1);
  });

  const extraSection = section("스코어 점수 (1등 50 / 2등 45 / 3등 40 / 4등 35)");
  buttons(extraSection,d.extra,(v)=>{d.extra=v;save()},30,50,5);

  const eagleSection = section("이글 (개당 10점)");
  buttons(eagleSection,d.eagle,(v)=>{d.eagle=v;save()},0,50,5);

  const birdieSection = section("버디 (개당 5점)");
  buttons(birdieSection,d.birdie,(v)=>{d.birdie=v;save()},0,50,5);

  const itemSection = section("구매 가능 아이템 – 각 1만원");

  const txt=document.createElement("div");
  txt.className="footer";
  txt.innerText =
    "멀리건 / 그린 공놔주기 / 컨시드 1m추가 / 시간 1분 추가 / 볼 빼고 치기\n※ 홀인원 시 바로 우승";

  itemSection.appendChild(txt);
}

render();
</script>

</body>
</html>
