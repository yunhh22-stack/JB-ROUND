<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자</title>

<style>
body{margin:0;background:#0b1220;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{background:#22c55e;color:#000;font-weight:bold}
h2{margin:0 0 10px}
.row{display:flex;gap:5px}
</style>
</head>

<body>

<div id="login">
  <h2>관리자 로그인</h2>
  <input type="password" id="pw">
  <button onclick="login()">접속</button>
</div>

<div id="admin" style="display:none">

<div class="card">
<h2>타이틀</h2>
<input id="title">
<button onclick="saveConfig()">저장</button>
</div>

<div class="card">
<h2>항목 이름</h2>
<div id="labels"></div>
</div>

<div class="card">
<h2>아이템 문구</h2>
<input id="itemText">
<button onclick="saveConfig()">저장</button>
</div>

<div class="card">
<h2>점수 직접 수정</h2>
<div id="scores"></div>
</div>

<div class="card">
<button onclick="reset()">전체 초기화</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAI0fh14tmNc0y9HcAkQ34l0Z_1BFbpiOw",
  authDomain:"jb-roun.firebaseapp.com",
  projectId:"jb-roun"
});

const db = getFirestore(app);
const ref = doc(db,"game","live");

const players=["윤상연","박상현","이선영","원미진"];

let state={};

window.login=function(){
  if(document.getElementById("pw").value==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("admin").style.display="block";
  }else alert("비밀번호 오류");
};

onSnapshot(ref,(snap)=>{
  if(!snap.exists()) return;
  state=snap.data();

  // 🔥 config 자동 생성
  if(!state.config){
    state.config={
      title:"2026 1st JB ROUND",
      labels:["매너","인성","패션","인상","말투"],
      itemText:"멀리건 / 공놔주기 / 컨시드"
    };
    save();
  }

  render();
});

function save(){ setDoc(ref,state); }

function render(){

  document.getElementById("title").value=state.config.title;
  document.getElementById("itemText").value=state.config.itemText;

  const l=document.getElementById("labels");
  l.innerHTML="";
  state.config.labels.forEach((v,i)=>{
    const input=document.createElement("input");
    input.value=v;
    input.oninput=(e)=>state.config.labels[i]=e.target.value;
    l.appendChild(input);
  });

  const s=document.getElementById("scores");
  s.innerHTML="";

  state.scores.forEach((p,i)=>{
    const box=document.createElement("div");
    box.className="card";
    box.innerHTML=`<h3>${players[i]}</h3>`;

    p.att.forEach((v,idx)=>{
      const input=document.createElement("input");
      input.type="number";
      input.value=v;
      input.oninput=(e)=>{p.att[idx]=+e.target.value;save()};
      box.appendChild(input);
    });

    ["extra","eagle","birdie"].forEach(k=>{
      const input=document.createElement("input");
      input.type="number";
      input.value=p[k];
      input.oninput=(e)=>{p[k]=+e.target.value;save()};
      box.appendChild(input);
    });

    s.appendChild(box);
  });
}

window.saveConfig=function(){
  state.config.title=document.getElementById("title").value;
  state.config.itemText=document.getElementById("itemText").value;
  save();
};

window.reset=function(){
  state.scores=players.map(()=>({att:[0,0,0,0,0],extra:30,eagle:0,birdie:0}));
  save();
};
</script>

</body>
</html>
